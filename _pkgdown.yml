url: https://stufield.github.io/libml/

development:
  mode: auto

authors:
  Stu Field:
    href: https://github.com/stufield

home:
  links:
  - text: Learn more about me
    href: https://github.com/stufield

template:
  bootstrap: 5
  package: tidytemplate
  bslib:
    bg: "#202123"      # dark theme
    fg: "#B8BCC2"      # dark theme
    primary: "#0054AD"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
    base_font: {google: "Roboto"}

navbar:
  structure:
    left: [intro, reference, articles, workflows, news]
    right: [search, github]
  components:
    intro:
      text: Get Started
      href: articles/libml.html


articles:
  - title: Getting Started
    navbar: ~
    contents:
    - libml

  - title: Nested Tibbles in Analyses
    navbar: ~
    desc: >
      Short tutorial on how to use a list-column approach in
      simple univariate analyses via simple t-test example.
    contents:
    - t-test-nested-analysis

  - title: Plotting ROC Curves
    navbar: ~
    desc: >
      Short tutorial on how to plot ROC curves and generate AUCs using
      multiple ggplot2-based plotting functions.
    contents:
    - plotting-ROC-with-geom_roc


reference:
  - title: Univariate Tests
    desc: >
      Generate a table of univariate tests.
    contents:
    - calc_univariate
    - mack_wolfe

  - title: Classifier performance
    desc: >
      Utilities for evaluating (binary) classifier performance,
      including confusion matrix tools.
    contents:
    - calc_confusion
    - calc_brier
    - pull_stat
    - get_spec_cutoff
    - get_max_cutoff
    - calc_auc
    - calc_boot_auc

  - title: Training data
    desc: >
      Tools for creating and manipulating training data
      objects of class `tr_data`.
    contents:
    - create_train

  - title: The fit* family
    desc: >
      Convenient wrappers for fitting various model types.
    contents:
    - starts_with("fit_")
    - stripLMC

  - title: Model utilities
    desc: >
      Predict, pull out components, manipulate, and interrogate model objects.
    contents:
    - s3-calc_predictions
    - starts_with("get_")
    - select_features
    - kfold_cv
    - reexports

  - title: Plotting utilities
    desc: >
      Plot various model fitting related visualizations.
    contents:
    - starts_with("plot_")
    - barplot_auc

  - title: ROC related utilities
    desc: >
      Tools for generating and evaluating Reciever Operaterator Criterion.
    contents:
    - matches("*roc*")
    - add_ss_box
    - calc_ci_binom

  - title: Parameters
    desc:  Common parameter definitions used by the package.
    contents:
    - params

  - title: Data
    desc:  Package data objects.
    contents:
    - fake_iris

news:
  - one_page: true
